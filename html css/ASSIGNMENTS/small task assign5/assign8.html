<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Product Card</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #f5f5f5;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.card {
  background: white;
  padding: 20px;
  width: 250px;
  text-align: center;
  border-radius: 10px;
  transition: 0.3s;
}

.card:hover {
  box-shadow: 0 10px 25px rgba(0,0,0,0.2);
}

.card img {
  width: 100%;
  border-radius: 10px;
}

.price {
  color: green;
  font-size: 20px;
  margin: 10px 0;
}

button {
  background: #007bff;
  color: white;
  border: none;
  padding: 10px;
  width: 100%;
  border-radius: 5px;
  cursor: pointer;
}

button:hover {
  background: #0056b3;
}
</style>

</head>
<body>

<div class="card">
  <img src="https://www.shutterstock.com/image-photo/various-cosmetic-products-containers-bottles-600nw-2568529501.jpg" alt="Product Image">
  <h2>Product Name</h2>
  <p class="price">$29.99</p>
  <button>Add to Cart</button>
</div>

</body>
</html>
