<!DOCTYPE html>
<html>
<head>
<style>
body{
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  background:#f4f4f4;
  font-family:Arial;
}

.card{
  background:#fff;
  padding:20px;
  width:300px;
  text-align:center;
  border-radius:10px;
  box-shadow:0 5px 15px rgba(0,0,0,0.2);
  transition:0.3s;
}

.card:hover{
  transform:translateY(-10px);
}

.card img{
  width:100px;
  border-radius:50%;
}

.social a{
  margin:10px;
  text-decoration:none;
  font-size:18px;
}
</style>
</head>

<body>

<div class="card">
  <img src="./assets/IMG-20220205-WA0043.jpg">
  <h2>Vaishu</h2>
  <p>Frontend Developer</p>

  <div class="social">
    <a href="#">🌐</a>
    <a href="#">📘</a>
    <a href="#">🐦</a>
  </div>
</div>

</body>
</html>
