<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hero Section</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

/* Hero Section */
.hero {
    height: 100vh;
    background-image: url('https://images.unsplash.com/photo-1498050108023-c5249f4df085');
    background-size: cover;
    background-position: center;

    display: flex;
    justify-content: center;
    align-items: center;
    text-align: center;
    color: white;
    position: relative;
}

/* Overlay */
.hero::after {
    content: "";
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.6);
}

/* Content */
.hero-content {
    position: relative;
    z-index: 1;
    max-width: 600px;
    padding: 20px;
}

/* Heading */
.hero-content h1 {
    font-size: 42px;
    margin-bottom: 15px;
}

/* Description */
.hero-content p {
    font-size: 18px;
    margin-bottom: 20px;
}

/* Button */
.btn {
    padding: 12px 25px;
    font-size: 16px;
    background: #ff5722;
    border: none;
    border-radius: 25px;
    color: white;
    cursor: pointer;
    transition: 0.3s;
}

.btn:hover {
    background: #e64a19;
}
</style>
</head>

<body>

<section class="hero">
    <div class="hero-content">
        <h1>Build Your Dream Website</h1>
        <p>Learn HTML & CSS with simple and powerful projects.</p>
        <button class="btn">Get Started</button>
    </div>
</section>

</body>
</html>
