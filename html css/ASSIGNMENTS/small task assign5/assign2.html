<!DOCTYPE html>
<html>
<head>
<style>
body{
  font-family:Arial;
  display:flex;
  justify-content:center;
  gap:20px;
  padding:50px;
}

.card{
  border:1px solid #ddd;
  padding:20px;
  width:250px;
  text-align:center;
  border-radius:10px;
}

.highlight{
  border:2px solid #00bcd4;
  transform:scale(1.1);
}

button{
  padding:10px;
  background:#333;
  color:white;
  border:none;
  margin-top:10px;
}
</style>
</head>

<body>

<div class="card">
  <h3>Basic</h3>
  <p>₹199</p>
  <p>1 Website</p>
  <button>Buy</button>
</div>

<div class="card highlight">
  <h3>Standard</h3>
  <p>₹499</p>
  <p>5 Websites</p>
  <button>Buy</button>
</div>

<div class="card">
  <h3>Premium</h3>
  <p>₹999</p>
  <p>Unlimited</p>
  <button>Buy</button>
</div>

</body>
</html>
