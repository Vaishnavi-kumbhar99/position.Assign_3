<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Discover World</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
 <style>
    *{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins;
}

body{
background:#f2f5f7;
display:flex;
justify-content:center;
padding:40px;
}

.hero{
width:900px;
background:white;
padding:40px;
border-radius:15px;
box-shadow:0 10px 30px rgba(0,0,0,0.15);
}

.container{
display:flex;
align-items:center;
justify-content:space-between;
}

.text{
width:50%;
}

.script{
font-family:Pacifico;
color:#2b6cb0;
font-size:40px;
}

h1{
font-size:50px;
font-weight:700;
}

p{
margin:15px 0;
color:#666;
}

.buttons{
display:flex;
align-items:center;
gap:20px;
}

.btn{
background:#1e63d5;
color:white;
border:none;
padding:10px 20px;
border-radius:20px;
cursor:pointer;
}

.demo{
color:#1e63d5;
font-weight:600;
cursor:pointer;
}

.demo i{
margin-right:8px;
}

.image{
width:45%;
background:#1e63d5;
padding:20px;
border-radius:20px;
transform:rotate(-5deg);
}

.image img{
width:100%;
transform:rotate(5deg);
}

.stats{
display:flex;
justify-content:center;
gap:20px;
margin-top:30px;
}

.box{
background:#1e63d5;
color:white;
padding:15px 25px;
border-radius:10px;
text-align:center;
}
 </style>

</head>
<body>

<section class="hero">

<div class="container">

<div class="text">

<h3 class="script">Discover</h3>
<h1>The World</h1>

<p>
Let’s embark on a global journey, immersing ourselves in
diverse cultures and creating unforgettable memories
as we travel the world!
</p>

<div class="buttons">

<button class="btn">Explore More</button>

<span class="demo">
<i class="fa-solid fa-play"></i>
Watch Demo
</span>

</div>

</div>

<div class="image">

<img src="./assets1/traveler-removebg-preview.png" alt="traveler">

</div>

</div>


<div class="stats">

<div class="box">
<h2>66+</h2>
<p>Countries</p>
</div>

<div class="box">
<h2>24M+</h2>
<p>Per Year User</p>
</div>

<div class="box">
<h2>03K+</h2>
<p>Experiences</p>
</div>

</div>

</section>

</body>
</html>
