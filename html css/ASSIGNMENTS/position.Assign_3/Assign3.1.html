<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assignment 1</title>
</head>
<style>
    body{
        height: 800px;
        margin: 0;
        
       
    }
    .container{
        position: relative;
        background-color: lightgreen;
        height: 800px;
    }

    .box1{
         background-color: red;
         width: 150px;
         height: 150px;
         border: 1px solid black;
         position: static;
        
    
    }
    .box2{
        background-color: blue;
        position: relative;
        top:  50px;
        left: 100px;
         z-index: 2;
            width: 150px;
            height: 150px;
            border: 1px solid black;
                   
    }
    .box3{
        background-color: green;
        width: 150px;
        height: 150px;
        border: 1px solid black;
        position: absolute;
        bottom: 50px;
        right: 100px;
        z-index: 1;
    }
    .box4{
        background-color: yellow;
        width: 150px;
        height: 150px;
        border: 1px solid black;    
        position: fixed;
        bottom: 0;
        right: 0;
        
    }
</style>
<body>
    <div class="container">
    <div class="box1">box 1-static</div>
    <div class="box2">box 2-relative</div>
    <div class="box3">box 3-absolute</div>
    <div class="box4">box 4-fixed</div>
    </div>
    
</body>
</html>
