<!DOCTYPE html>
<html>
<head>
<title>Animal Layout</title>

<style>

body{
margin:0;
background:#e0b11c;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
font-family:Arial;
}

.container{
width:900px;
height:600px;
position:relative;
}

/* circle images */

.circle{
width:240px;
height:240px;
border-radius:50%;
overflow:hidden;
border:10px solid #f2c21b;
position:absolute;
}

.circle img{
width:100%;
height:100%;
object-fit:cover;
}

/* positions */

.top-left{
top:0;
left:80px;
}

.top-right{
top:0;
right:80px;
}

.center{
top:180px;
left:330px;
}

.bottom-left{
bottom:0;
left:150px;
}

.bottom-right{
bottom:0;
right:150px;
}

</style>
</head>

<body>

<div class="container">

<div class="circle top-left">
<img src="https://images.unsplash.com/photo-1474511320723-9a56873867b5">
</div>

<div class="circle top-right">
<img src="https://images.unsplash.com/photo-1546182990-dffeafbe841d">
</div>

<div class="circle center">
<img src="https://images.unsplash.com/photo-1552410260-0fd9b577afa6">
</div>

<div class="circle bottom-left">
<img src="https://images.unsplash.com/photo-1501706362039-c6b2a7b1f6a1">
</div>

<div class="circle bottom-right">
<img src="https://images.unsplash.com/photo-1549366021-9f761d450615">
</div>

</div>

</body>
</html>
