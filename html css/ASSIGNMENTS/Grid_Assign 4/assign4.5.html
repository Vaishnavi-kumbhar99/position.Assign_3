<!DOCTYPE html>
<html>
<head>
<title>Card Layout Grid</title>

<style>

body{
    font-family:Arial;
    margin:0;
    padding:20px;
    background:#f5f5f5;
}

/* Grid Container */

.card-container{
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(250px,1fr));
    gap:20px;
}

/* Card Style */

.card{
    background:white;
    border-radius:10px;
    box-shadow:0 4px 10px rgba(0,0,0,0.2);
    overflow:hidden;
}

/* Image */

.card img{
    width:100%;
    height:180px;
    object-fit:cover;
}

/* Card Content */

.card-content{
    padding:15px;
}

.card-content h3{
    margin:0 0 10px;
}

.card-content p{
    color:#555;
}

</style>
</head>

<body>

<h2>Card Layout with Implicit Grid</h2>

<div class="card-container">

<div class="card">
<img src="https://picsum.photos/400/200?1">
<div class="card-content">
<h3>Card Title 1</h3>
<p>This is a simple card description.</p>
</div>
</div>

<div class="card">
<img src="https://picsum.photos/400/200?2">
<div class="card-content">
<h3>Card Title 2</h3>
<p>This is a simple card description.</p>
</div>
</div>

<div class="card">
<img src="https://picsum.photos/400/200?3">
<div class="card-content">
<h3>Card Title 3</h3>
<p>This is a simple card description.</p>
</div>
</div>

<div class="card">
<img src="https://picsum.photos/400/200?4">
<div class="card-content">
<h3>Card Title 4</h3>
<p>This is a simple card description.</p>
</div>
</div>

<div class="card">
<img src="https://picsum.photos/400/200?5">
<div class="card-content">
<h3>Card Title 5</h3>
<p>This is a simple card description.</p>
</div>
</div>

</div>

</body>
</html>
