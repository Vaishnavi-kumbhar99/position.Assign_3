<!DOCTYPE html>
<html>
<head>
<title>Blog Page Layout</title>

<style>

body{
    margin:0;
    font-family:Arial;
}

/* Grid Container */

.container{
    display:grid;
    grid-template-areas:
    "header header"
    "sidebar main"
    "footer footer";
    
    grid-template-columns:1fr 3fr;
    grid-template-rows:80px 1fr 60px;
    height:100vh;
    gap:10px;
}

/* Sections */

.header{
    grid-area:header;
    background:#3498db;
    color:white;
    display:flex;
    align-items:center;
    justify-content:center;
}

.sidebar{
    grid-area:sidebar;
    background:#2ecc71;
    color:white;
    padding:20px;
}

.main{
    grid-area:main;
    background:#f1c40f;
    padding:20px;
}

.footer{
    grid-area:footer;
    background:#34495e;
    color:white;
    display:flex;
    align-items:center;
    justify-content:center;
}

</style>
</head>

<body>

<div class="container">

<div class="header">
<h2>Blog Header</h2>
</div>

<div class="sidebar">
<h3>Sidebar</h3>
<p>Links</p>
<p>Categories</p>
<p>Archives</p>
</div>

<div class="main">
<h2>Main Content</h2>
<p>This is the blog content area.</p>
<p>You can write articles here.</p>
</div>

<div class="footer">
<p>Blog Footer</p>
</div>

</div>

</body>
</html>
