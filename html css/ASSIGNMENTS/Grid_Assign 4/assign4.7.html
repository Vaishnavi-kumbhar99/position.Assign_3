<!DOCTYPE html>
<html>
<head>
<title>Grid Blog Layout</title>

<style>

body{
    margin:40px;
    font-family: Arial;
}

.grid{
    display:grid;
    grid-template-columns: repeat(3,1fr);
    grid-gap:15px;
}

.card{
    position:relative;
    color:white;
}

.card img{
    width:100%;
    height:100%;
    object-fit:cover;
}

.text{
    position:absolute;
    top:15px;
    left:15px;
    font-size:18px;
}

.read{
    position:absolute;
    bottom:15px;
    right:15px;
    font-size:12px;
}

/* spans */

.col2{
    grid-column:span 2;
}

.row2{
    grid-row:span 2;
}

</style>

</head>

<body>

<div class="grid">

<div class="card">
<img src="https://images.unsplash.com/photo-1501004318641-b39e6451bec6">
<div class="text">The winter of my discontent</div>
<div class="read">READ POST</div>
</div>

<div class="card col2">
<img src="https://images.unsplash.com/photo-1444723121867-7a241cacace9">
<div class="text">Instagram is toxic but I keep posting</div>
<div class="read">READ POST</div>
</div>

<div class="card col2">
<img src="https://images.unsplash.com/photo-1507525428034-b723cf961d3e">
<div class="text">Throwing my phone into the ocean</div>
<div class="read">READ POST</div>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1494526585095-c41746248156">
<div class="text">I'm never leaving my mom</div>
<div class="read">READ POST</div>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee">
<div class="text">Staring at the horizon thinking</div>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1470770841072-f978cf4d019e">
<div class="text">This is water</div>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1469474968028-56623f02e42e">
<div class="text">Tapio for one please</div>
</div>

</div>

</body>
</html>
