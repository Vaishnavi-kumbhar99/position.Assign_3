<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>assignment2.5</title>
<style>

.box1{
    height: 200px;
    width: 400px;
    border: 1px solid black;
    margin:auto;
    margin-top: 100px;
    text-align: center;

}
button{
    padding: 10px 20px;
    font-size: 15px;
    border: none;
    border-radius: 5%;
    cursor: pointer;
    margin-top: 30px;

}

.primary{
    background-color: white;
    color:black;
    border: 1px solid black;

}
.secondary{
     background-color: white;
    color:black;
    border: 1px solid black;
    margin-left: 20px;


}
.primary:hover{
    background-color: rgb(117, 58, 169);
    color: white;
}
.secondary:hover{
    background-color: rgb(231, 231, 148);
}



</style>

</head>

<body>

    <div class="box1">

        <h1>Simple Button Design</h1>

<button class="primary">primary</button>

<button class="secondary">secondary</button>
    </div>


    
</body>
</html>
