<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Gallery Grid assignment2.10</title>
    <style>
        .box{
            display: grid;
            grid-template-columns:repeat(3,1fr);
            gap: 15px;
            padding: 20px;

        }
        .box div{
            border: 2px solid black;
            overflow: hidden;
            
        }
        .box img{
            width: 100%;
            height: 200px;
            transition: transform.4s;
        }
        .box img:hover{
            transform: scale(1,2);
        }
    </style>
</head>
