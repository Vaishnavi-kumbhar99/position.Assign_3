<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animated Card assignment2.13</title>
    <style>
        body{
            margin: 0;
            padding: 0;
        }
        .box{
            width: 300px;
            height: 400px;
            border: 1px solid black;
            margin: auto;
            margin-top: 100px;
            display: grid;
            grid-template-columns: repeat(auto-fit,minmax(250px, 1fr));
            gap: 15px;
            padding: 20px;
            transition: 0.3s ease;
            cursor: pointer;
            border-radius: 10px;
            
        }
        
        
        .box img{
            width: 300px;
            height: 300px;
            border-radius: 12px;
            transition: 0.3s ease;
            cursor: pointer;
            display: block;
            margin: auto;
        }
        .box:hover{
            transform: scale(1.02);
            box-shadow: 5px 5px 5px 5px black;
        }
        h1{
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="box">
    
    
        <img src="https://plus.unsplash.com/premium_photo-1703806517546-581595edd4e4?w=600&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8MXx8cm9zZSUyMGZsb3dlcnxlbnwwfHwwfHx8MA%3D%3D">
        
    
    <h1>Rose Gallery ...</h1>
</div>
</body>
</html>
