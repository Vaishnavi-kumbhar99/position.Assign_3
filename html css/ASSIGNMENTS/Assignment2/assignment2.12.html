<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hero Section assignment2.12</title>
<style>
    body{
margin:0;
font-family:Arial, sans-serif;
}

.hero{
height:100vh;
background-image:url("https://picsum.photos/1600/900");
background-size:cover;
background-position:center;
display:flex;
justify-content:center;
align-items:center;
position:relative;
text-align:center;
color:white;
}

.overlay{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.5);
}

.hero-content{
position:relative;
z-index:2;
max-width:600px;
}

.hero h1{
font-size:50px;
margin-bottom:20px;
}

.hero p{
font-size:20px;
margin-bottom:20px;
}

button{
padding:12px 25px;
border:none;
background:#ff6b6b;
color:white;
font-size:16px;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:blue;
}

/* Responsive */
@media(max-width:600px){

.hero h1{
font-size:32px;
}

.hero p{
font-size:16px;
}

}
</style>
</head>
<body>

<section class="hero">

<div class="overlay"></div>

<div class="hero-content">
    <h1>Welcome to My Website</h1>
    <p>Learn web development and build beautiful websites easily.</p>
    <button>Get Started</button>
</div>

</section>

</body>
</html>
