<!DOCTYPE html>
<html>
<head>
<title>Pricing Table assignment 2.14</title>
<style>
    body{
font-family:Arial;
background:#f4f4f4;
}

.pricing{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:20px;
padding:40px;
margin-top: 200px;
}

.card{
background:white;
padding:20px;
text-align:center;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

.card ul{
list-style:none;
padding:0;
}

.card li{
margin:10px 0;
}

button{
padding:10px 20px;
background:#007BFF;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}
.card:hover{
transform:translateY(-10px);
box-shadow:0 15px 30px rgba(0,0,0,0.4);
}
</style>
</head>
<body>

<div class="pricing">

<div class="card">
<h2>Basic</h2>
<h3>$10</h3>
<ul>
<li>1 Website</li>
<li>Basic Support</li>
<li>10GB Storage</li>
</ul>
<button>Buy Now</button>
</div>

<div class="card">
<h2>Pro</h2>
<h3>$20</h3>
<ul>
<li>5 Websites</li>
<li>Priority Support</li>
<li>50GB Storage</li>
</ul>
<button>Buy Now</button>
</div>

<div class="card">
<h2>Premium</h2>
<h3>$40</h3>
<ul>
<li>Unlimited Websites</li>
<li>24/7 Support</li>
<li>200GB Storage</li>
</ul>
<button>Buy Now</button>
</div>

</div>

</body>
</html
