<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assignment 1</title>
</head>
    <style>

       

body{
    height: 700px;
    margin: 0;
}

.conteiner{
    background-color: gray;
    position: relative;
    width: 100%;
    height: 100%;
    border-radius: 5px;
} 

.box1{
    background-color: brown;
    position: static;
    width: 150px;
    height: 150px;
    border: 1px solid black;
}

.box2{
    background-color: green;
    position: relative;
    width: 150px;
    height: 150px;
    top: 50px;
    left: 100px;
    border: 1px solid black;
    z-index: 2;
}

.box3{
    background-color: yellow;
    position: absolute;
    width: 150px;
    height: 150px;
    bottom: 50px;
    right: 100px;
    z-index: 1;
    border: 1px solid black;
}

.box4{
    background-color: red;
    position: fixed;
    width: 150px;
    height: 150px;
    bottom: 0;
    right: 0;
    border: 1px solid black;
}

</style>
<body>

    <div class="conteiner">
    <div class="box1">box1:static</div>
    <div class="box2">box2:relative</div>
    <div class="box3">box3:absolute</div>
    <div class="box4">box4:fixed</div>
    </div>
    
</body>
</html>
